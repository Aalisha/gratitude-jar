<!-- Gratitude Jar — a soft daily ritual -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gratitude Jar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Caveat:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#BFE0F0;
    --sky-mid:#D8ECEC;
    --horizon:#EAF4E6;
    --cream:#FBF4E2;
    --paper:#FCF7EA;
    --ink:#5C5142;
    --ink-soft:#9A8C77;
    --meadow:#9AC383;
    --meadow-deep:#6FA05C;
    --meadow-shadow:#7FAE6A;
    --peach:#F2B089;
    --peach-deep:#E08F66;
    --sun:#FCE9A8;
    --glass:rgba(255,255,255,0.30);
    --glass-edge:rgba(255,255,255,0.65);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:'Quicksand',system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 46%,var(--horizon) 70%,var(--cream) 100%);
    min-height:100%;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* soft sun glow */
  body::before{
    content:"";position:fixed;top:-160px;right:-120px;width:420px;height:420px;
    background:radial-gradient(circle,var(--sun) 0%,rgba(252,233,168,0.35) 38%,transparent 68%);
    pointer-events:none;z-index:0;
  }
  .wrap{position:relative;z-index:2;max-width:560px;margin:0 auto;padding:34px 22px 70px;text-align:center}

  h1{
    font-family:'Klee One',serif;font-weight:600;letter-spacing:.4px;
    font-size:2.5rem;margin:.2em 0 .05em;color:var(--ink);
    text-shadow:0 1px 0 rgba(255,255,255,.5);
  }
  .tagline{font-family:'Caveat',cursive;font-size:1.45rem;color:var(--meadow-deep);margin:0 0 6px}

  /* ---------- the jar scene ---------- */
  .scene{position:relative;margin:6px auto 2px;width:300px;height:330px}
  /* grassy mound */
  .mound{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:340px;height:96px;
    background:radial-gradient(ellipse at 50% 100%,var(--meadow) 0%,var(--meadow) 55%,var(--meadow-shadow) 100%);
    border-radius:50% 50% 40% 40%/70% 70% 100% 100%;
    box-shadow:inset 0 6px 14px rgba(255,255,255,.25);
  }
  .grass{position:absolute;bottom:54px;width:8px;height:20px;background:var(--meadow-deep);
    border-radius:50% 50% 0 0;transform-origin:bottom center;opacity:.85}
  .jarwrap{position:absolute;left:50%;bottom:40px;transform:translateX(-50%);transform-origin:50% 92%}
  .jarwrap.shake{animation:shake 1s ease-in-out}
  @keyframes shake{
    0%,100%{transform:translateX(-50%) rotate(0)}
    15%{transform:translateX(-50%) rotate(-4deg)}
    32%{transform:translateX(-50%) rotate(3.5deg)}
    50%{transform:translateX(-50%) rotate(-2.5deg)}
    68%{transform:translateX(-50%) rotate(2deg)}
    85%{transform:translateX(-50%) rotate(-1deg)}
  }
  svg{display:block;overflow:visible}

  .count{font-family:'Caveat',cursive;font-size:1.3rem;color:var(--ink-soft);margin:2px 0 18px}

  /* ---------- controls ---------- */
  .panel{
    background:var(--paper);
    border:1.5px solid rgba(157,140,116,.28);
    border-radius:22px;
    padding:18px 18px 16px;
    box-shadow:0 10px 26px rgba(120,150,120,.16);
    text-align:left;margin-bottom:16px;
  }
  label{display:block;font-weight:600;font-size:.96rem;color:var(--ink);margin-bottom:8px}
  textarea{
    width:100%;border:1.5px solid rgba(157,140,116,.3);border-radius:14px;
    background:#FFFDF6;padding:12px 14px;resize:none;color:var(--ink);
    font-family:'Caveat',cursive;font-size:1.4rem;line-height:1.25;min-height:78px;
  }
  textarea::placeholder{color:#C3B7A1}
  textarea:focus{outline:none;border-color:var(--meadow);box-shadow:0 0 0 3px rgba(154,195,131,.25)}

  .btn{
    font-family:'Quicksand',sans-serif;font-weight:600;font-size:1rem;
    border:none;border-radius:999px;padding:12px 22px;cursor:pointer;
    transition:transform .12s ease,box-shadow .2s ease,filter .2s ease;
  }
  .btn:active{transform:translateY(1px)}
  .btn-add{margin-top:12px;width:100%;background:var(--meadow-deep);color:#fff;
    box-shadow:0 6px 14px rgba(111,160,92,.4)}
  .btn-add:hover{filter:brightness(1.05)}
  .btn-draw{width:100%;background:var(--peach);color:#5c3b27;
    box-shadow:0 6px 14px rgba(224,143,102,.4);font-size:1.08rem;padding:15px}
  .btn-draw:hover{filter:brightness(1.04)}
  .btn-draw:disabled{background:#E4DAC6;color:#A99C84;cursor:default;box-shadow:none;filter:none}
  .redraw{display:inline-block;margin-top:10px;background:none;border:none;cursor:pointer;
    color:var(--ink-soft);font-family:'Quicksand';font-size:.86rem;text-decoration:underline;
    text-underline-offset:3px}
  .redraw:hover{color:var(--meadow-deep)}

  /* ---------- revealed letter ---------- */
  .reveal-back{
    position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
    background:rgba(92,81,66,.32);backdrop-filter:blur(2px);padding:22px;
  }
  .reveal-back.open{display:flex}
  .letter{
    position:relative;max-width:360px;width:100%;background:var(--paper);
    border-radius:8px;padding:30px 26px 24px;
    box-shadow:0 18px 50px rgba(80,70,55,.35);
    background-image:repeating-linear-gradient(transparent,transparent 33px,rgba(157,140,116,.16) 34px);
    transform:scale(.7) rotate(-3deg);opacity:0;
    animation:unfold .5s cubic-bezier(.22,1.2,.36,1) forwards;
  }
  @keyframes unfold{to{transform:scale(1) rotate(0);opacity:1}}
  .letter .pin{position:absolute;top:-10px;left:50%;transform:translateX(-50%);
    width:30px;height:30px;border-radius:50%;background:var(--peach);
    box-shadow:0 3px 6px rgba(0,0,0,.2),inset 0 -3px 5px rgba(0,0,0,.12)}
  .letter .ldate{font-family:'Quicksand';font-size:.8rem;letter-spacing:.6px;
    text-transform:uppercase;color:var(--meadow-deep);font-weight:700;margin:6px 0 12px}
  .letter .ltext{font-family:'Caveat',cursive;font-size:1.85rem;line-height:1.55;color:var(--ink);
    word-break:break-word;white-space:pre-wrap}
  .letter-actions{display:flex;gap:10px;margin-top:22px}
  .letter-actions .btn{flex:1;font-size:.94rem;padding:11px}
  .btn-share{background:var(--meadow-deep);color:#fff}
  .btn-close{background:transparent;color:var(--ink-soft);border:1.5px solid rgba(157,140,116,.4)}

  /* toast */
  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#FCF7EA;padding:11px 20px;border-radius:999px;
    font-size:.9rem;font-weight:500;opacity:0;pointer-events:none;z-index:40;
    transition:opacity .3s,transform .3s;font-family:'Quicksand';
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* drifting pollen motes */
  .mote{position:fixed;border-radius:50%;background:rgba(255,250,225,.85);
    box-shadow:0 0 6px 2px rgba(255,245,200,.5);z-index:1;pointer-events:none;
    animation:drift linear infinite}
  @keyframes drift{
    0%{transform:translate(0,0);opacity:0}
    10%{opacity:.9}
    90%{opacity:.9}
    100%{transform:translate(var(--dx),-115vh);opacity:0}
  }
  @media (prefers-reduced-motion:reduce){
    .mote{display:none}
    .jarwrap.shake{animation:none}
    .letter{animation:none;transform:none;opacity:1}
  }
</style>

<div class="wrap">
  <h1>Gratitude Jar</h1>
  <p class="tagline">a little note for every good day</p>

  <div class="scene">
    <div class="mound"></div>
    <div id="grasses"></div>
    <div class="jarwrap" id="jarwrap">
      <svg width="180" height="240" viewBox="0 0 180 240" aria-hidden="true">
        <!-- jar shadow -->
        <ellipse cx="90" cy="232" rx="62" ry="9" fill="rgba(111,160,92,.35)"/>
        <!-- glass body -->
        <path d="M34 70 Q34 58 46 56 L134 56 Q146 58 146 70
                 L146 210 Q146 228 126 230 L54 230 Q34 228 34 210 Z"
              fill="var(--glass)" stroke="var(--glass-edge)" stroke-width="3"/>
        <!-- inner notes pile -->
        <clipPath id="jarClip">
          <path d="M40 72 L140 72 L140 208 Q140 224 124 225 L56 225 Q40 224 40 208 Z"/>
        </clipPath>
        <g id="notes" clip-path="url(#jarClip)"></g>
        <!-- glass highlight -->
        <path d="M48 70 Q48 64 56 64 L62 64 L52 222 Q46 222 46 210 Z"
              fill="rgba(255,255,255,.4)"/>
        <!-- neck + lid -->
        <rect x="40" y="44" width="100" height="16" rx="6" fill="var(--glass)" stroke="var(--glass-edge)" stroke-width="3"/>
        <rect x="36" y="26" width="108" height="26" rx="9" fill="var(--peach)" stroke="var(--peach-deep)" stroke-width="2.5"/>
        <rect x="36" y="34" width="108" height="7" fill="var(--peach-deep)" opacity=".4"/>
        <!-- little twine bow -->
        <path d="M62 52 Q90 64 118 52" stroke="var(--meadow-deep)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <p class="count" id="count">your jar is empty — add the first note below</p>

  <div class="panel">
    <label for="entry">What are you grateful for today?</label>
    <textarea id="entry" maxlength="280" placeholder="warm bread, an unexpected call, the way the light fell…"></textarea>
    <button class="btn btn-add" id="addBtn">Fold it into the jar</button>
  </div>

  <button class="btn btn-draw" id="drawBtn">Draw today's letter</button>
  <br>
  <button class="redraw" id="redrawBtn" hidden>draw a different one</button>
</div>

<!-- revealed letter -->
<div class="reveal-back" id="revealBack">
  <div class="letter" id="letter">
    <div class="pin"></div>
    <div class="ldate" id="ldate"></div>
    <div class="ltext" id="ltext"></div>
    <div class="letter-actions">
      <button class="btn btn-share" id="shareBtn">Share</button>
      <button class="btn btn-close" id="closeBtn">Tuck it back</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ---------- storage: works on a normal website (localStorage),
       inside the Claude app (window.storage), or in-memory as a last resort ---------- */
  const mem = {};
  const hasAnthropic = typeof window!=="undefined" && window.storage && typeof window.storage.get==="function";
  const hasLS = (function(){ try{ const k="__gj_test"; localStorage.setItem(k,"1"); localStorage.removeItem(k); return true; }catch(e){ return false; } })();
  async function load(key, fallback){
    try{
      if(hasAnthropic){ const r=await window.storage.get(key); return r ? JSON.parse(r.value) : fallback; }
      if(hasLS){ const v=localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
      return (key in mem) ? mem[key] : fallback;
    }catch(e){ return fallback; }
  }
  async function save(key, value){
    try{
      if(hasAnthropic){ await window.storage.set(key, JSON.stringify(value)); return; }
      if(hasLS){ localStorage.setItem(key, JSON.stringify(value)); return; }
      mem[key]=value;
    }catch(e){ mem[key]=value; }
  }

  /* ---------- helpers ---------- */
  const $ = id => document.getElementById(id);
  const NOTE_COLORS = ["#F6D6A8","#F4B59A","#BFE3C0","#C9DDF0","#E8C9E0","#F7E4A1","#CDE7D9"];
  function todayKey(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function prettyDate(iso){
    const [y,m,d]=iso.split("-").map(Number);
    const dt=new Date(y,m-1,d);
    return dt.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric",year:"numeric"});
  }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

  let letters = [];     // {id, text, date}
  let drawState = null; // {date, letterId}

  /* ---------- render the pile inside the jar ---------- */
  function renderPile(){
    const g = $("notes");
    g.innerHTML = "";
    const n = letters.length;
    if(n===0) return;
    const shown = Math.min(n, 26);
    const baseY = 222, rows = Math.ceil(shown/3);
    let k = 0;
    for(let row=0; row<rows; row++){
      const y = baseY - row*15 - 8;
      const inRow = Math.min(3, shown - row*3);
      for(let c=0; c<inRow; c++){
        if(k>=shown) break;
        const x = 56 + c*32 + (row%2 ? 8 : 0) + (Math.sin(k*2.7)*4);
        const rot = (Math.sin(k*1.9)*22);
        const col = NOTE_COLORS[(n-1-k) % NOTE_COLORS.length];
        const r = document.createElementNS("http://www.w3.org/2000/svg","g");
        r.setAttribute("transform",`translate(${x} ${y}) rotate(${rot})`);
        r.innerHTML =
          `<rect x="-13" y="-9" width="26" height="18" rx="3" fill="${col}" stroke="rgba(92,81,66,.18)" stroke-width="1"/>`+
          `<line x1="-13" y1="0" x2="13" y2="0" stroke="rgba(92,81,66,.18)" stroke-width="1"/>`;
        g.appendChild(r);
        k++;
      }
    }
  }

  function renderCount(){
    const n = letters.length;
    const el = $("count");
    if(n===0){ el.textContent = "your jar is empty — add the first note below"; }
    else{ el.textContent = n===1 ? "1 note resting in your jar" : n+" notes resting in your jar"; }
    $("drawBtn").disabled = n===0;
    const drawnToday = drawState && drawState.date===todayKey();
    $("drawBtn").textContent = n===0 ? "Add a note first" : (drawnToday ? "See today's letter" : "Draw today's letter");
    $("redrawBtn").hidden = !(drawnToday && n>1);
  }

  /* ---------- grass blades ---------- */
  (function grass(){
    const host=$("grasses");
    const xs=[80,108,200,218,150];
    xs.forEach((x,i)=>{
      const b=document.createElement("div");
      b.className="grass";
      b.style.left=x+"px";
      b.style.height=(16+(i%3)*6)+"px";
      b.style.transform=`rotate(${(i%2?1:-1)*(6+i)}deg)`;
      host.appendChild(b);
    });
  })();

  /* ---------- pollen motes ---------- */
  (function motes(){
    if(window.matchMedia && window.matchMedia("(prefers-reduced-motion:reduce)").matches) return;
    for(let i=0;i<14;i++){
      const m=document.createElement("div");
      m.className="mote";
      const s=2+Math.random()*4;
      m.style.width=m.style.height=s+"px";
      m.style.left=(Math.random()*100)+"vw";
      m.style.top=(100+Math.random()*20)+"vh";
      m.style.setProperty("--dx",(Math.random()*120-60)+"px");
      m.style.animationDuration=(16+Math.random()*16)+"s";
      m.style.animationDelay=(-Math.random()*24)+"s";
      document.body.appendChild(m);
    }
  })();

  /* ---------- toast ---------- */
  let toastT;
  function toast(msg){
    const t=$("toast"); t.textContent=msg; t.classList.add("show");
    clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200);
  }

  /* ---------- add a letter ---------- */
  async function addLetter(){
    const ta=$("entry"); const text=ta.value.trim();
    if(!text){ ta.focus(); toast("write a little something first 🌱"); return; }
    letters.push({id:uid(), text, date:todayKey()});
    await save("letters", letters);
    ta.value="";
    renderPile(); renderCount();
    // gentle drop bounce
    const jw=$("jarwrap"); jw.classList.remove("shake"); void jw.offsetWidth; jw.classList.add("shake");
    toast("folded into the jar ✦");
  }

  /* ---------- draw / reveal ---------- */
  function showLetter(l){
    $("ldate").textContent = prettyDate(l.date);
    $("ltext").textContent = l.text;
    const card=$("letter");
    card.style.animation="none"; void card.offsetWidth; card.style.animation="";
    $("revealBack").classList.add("open");
    $("revealBack").dataset.current = l.text + "||" + prettyDate(l.date);
  }

  async function drawLetter(forceNew){
    if(letters.length===0) return;
    const drawnToday = drawState && drawState.date===todayKey();
    let chosen;
    if(drawnToday && !forceNew){
      chosen = letters.find(l=>l.id===drawState.letterId) || letters[Math.floor(Math.random()*letters.length)];
    }else{
      // shuffle pick; avoid repeating today's pick when redrawing if possible
      let pool = letters;
      if(forceNew && drawnToday && letters.length>1){ pool = letters.filter(l=>l.id!==drawState.letterId); }
      chosen = pool[Math.floor(Math.random()*pool.length)];
      drawState = {date:todayKey(), letterId:chosen.id};
      await save("draw-state", drawState);
      const jw=$("jarwrap"); jw.classList.remove("shake"); void jw.offsetWidth; jw.classList.add("shake");
    }
    renderCount();
    setTimeout(()=>showLetter(chosen), (drawnToday && !forceNew)?0:520);
  }

  /* ---------- share ---------- */
  async function shareLetter(){
    const raw=$("revealBack").dataset.current||"";
    const [text,date]=raw.split("||");
    const msg=`"${text}"\n— grateful on ${date}`;
    try{
      if(navigator.share){ await navigator.share({title:"A note from my Gratitude Jar", text:msg}); return; }
    }catch(e){ if(e && e.name==="AbortError") return; }
    try{
      await navigator.clipboard.writeText(msg);
      toast("copied — ready to share 💌");
    }catch(e){ toast("couldn't copy here, try selecting the text"); }
  }

  /* ---------- wire up ---------- */
  $("addBtn").addEventListener("click", addLetter);
  $("entry").addEventListener("keydown", e=>{ if((e.metaKey||e.ctrlKey)&&e.key==="Enter") addLetter(); });
  $("drawBtn").addEventListener("click", ()=>drawLetter(false));
  $("redrawBtn").addEventListener("click", ()=>drawLetter(true));
  $("shareBtn").addEventListener("click", shareLetter);
  $("closeBtn").addEventListener("click", ()=>$("revealBack").classList.remove("open"));
  $("revealBack").addEventListener("click", e=>{ if(e.target===$("revealBack")) $("revealBack").classList.remove("open"); });
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") $("revealBack").classList.remove("open"); });

  /* ---------- boot ---------- */
  (async function init(){
    letters = await load("letters", []);
    drawState = await load("draw-state", null);
    if(!Array.isArray(letters)) letters=[];
    renderPile(); renderCount();
  })();
})();
</script>
